name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            dir: linux-x64
            ext: tar.gz
            package_cmd: tar -czf dist/md-cli-${{ matrix.platform.dir }}.tar.gz -C target/${{ matrix.platform.target }}/release md-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            dir: win32-x64
            ext: zip
            package_cmd: powershell -Command "Compress-Archive -Path 'target/${{ matrix.platform.target }}/release/md-cli.exe' -DestinationPath 'dist/md-cli-${{ matrix.platform.dir }}.zip'"
          - os: macos-latest
            target: x86_64-apple-darwin
            dir: darwin-x64
            ext: tar.gz
            package_cmd: tar -czf dist/md-cli-${{ matrix.platform.dir }}.tar.gz -C target/${{ matrix.platform.target }}/release md-cli
          - os: macos-latest
            target: aarch64-apple-darwin
            dir: darwin-arm64
            ext: tar.gz
            package_cmd: tar -czf dist/md-cli-${{ matrix.platform.dir }}.tar.gz -C target/${{ matrix.platform.target }}/release md-cli

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl-gcc
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add Apple targets
        if: matrix.platform.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.platform.target }}
          mkdir -p dist
          ${{ matrix.platform.package_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-cli-${{ matrix.platform.dir }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        run: |
          cargo login ${{ secrets.CARGO_TOKEN }}
          cargo publish --manifest-path Cargo.toml
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish to npm
        run: |
          cd npm
          npm version ${{ github.ref_name }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
